<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="slider.css">
    <style>
     .slider-container {
    width: 100%;
    height: 90vh; /* almost full height of screen */
    margin: 100px auto;
    overflow: hidden;
    position: relative;
    border-radius: 0; /* no rounded corners */
    box-shadow: none; /* remove frame shadow */
    background: black; /* optional, makes empty areas look nice */
}

.slider {
    display: flex;
    height: 100%;
    transition: transform 0.6s ease-in-out;
    width: 100%;
}

.slide {
    min-width: 100%;
    height: 100%;
    flex-shrink: 0;
    position: relative; 
    overflow: hidden;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* keeps image fully covering the screen */
    transform: scale(1.15); /* zoom effect for close-up look */
    transition: transform 0.8s ease-in-out;
}

.slide img:hover {
    transform: scale(1.25); /* extra zoom when hovering */
}

.slide::after {
    position: absolute;
    content: "";
    width: 100%;
    height: 100%;
    bottom: 0;
    left: 0;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.6));
    z-index: 1;
}

.slider-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: background 0.3s ease;
    z-index: 10;
}

.slider-arrow:hover {
    background: rgba(255, 255, 255, 0.3);
}

.prev {
    left: 20px;
}

.next {
    right: 20px;
}

.slider-nav {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 3;
}

.nav-dot {
    height: 12px;
    width: 12px;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    transition: all 0.3s ease-in-out;
}

.nav-dot.active,
.nav-dot:hover {
    background-color: white;
    transform: scale(1.3);
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
}

    </style>
</head>

<body>
    <div class="slider-container">
        <div class="slider">
            <div class="slide active">
                <img src="../images/slider/pexels-blue-bird-7210436.jpg">

            </div>
            <div class="slide">
                <img src="../images/slider/pexels-pixabay-416160 (3).jpg" >

            </div>
            <div class="slide">
                <img src="../images/slider/pexels-simonakidric-2607541.jpg" >

            </div>
            <div class="slide">
                <img src="../images/slider/pexels-peng-louis-587527-1643456.jpg" >

            </div>
            <div class="slide">
                <img src="../images/slider/pexels-helenalopes-1938123.jpg" >
            </div>
        </div>

        <div class="slider-nav">
        </div>

        <div class="slider-arrow prev">
            <span class="arrow-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
            </span>
        </div>
        <div class="slider-arrow next">
            <span class="arrow-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </span>
        </div>
    </div>

</body>
<script>
    const slides = document.querySelectorAll(".slide");
    const sliderNav = document.querySelector(".slider-nav");
    const slider = document.querySelector(".slider");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");


    const orderBtn = document.querySelector(".order-btn");

    let currentSlide = 0;
    let slideCount = slides.length;
    const dots = [];
    const cart = [];

    slides.forEach((_, index) => {
        const dot = document.createElement("div");
        dot.classList.add("nav-dot");
        if (index === 0) dot.classList.add("active");
        dot.addEventListener("click", () => goToSlide(index));
        sliderNav.appendChild(dot);
        dots.push(dot);
    });

    function updateDots() {
        dots.forEach((dot, index) => {
            dot.classList.toggle("active", index === currentSlide);
        });
    }

    function goToSlide(index) {
        currentSlide = (index + slideCount) % slideCount;
        slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        updateDots();
    }

    function nextSlide() {
        goToSlide(currentSlide + 1);
    }

    function prevSlide() {
        goToSlide(currentSlide - 1);
    }
    prevBtn.addEventListener("click", prevSlide);
    nextBtn.addEventListener("click", nextSlide);
    setInterval(nextSlide, 8000);


</script>

</html>
