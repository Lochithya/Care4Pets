<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="slider.css">
    <style>
        .slider-container {
            width: 100%;
            max-width: 1400px;
            height: 500px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            z-index: 99;
        }

        .slider {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .slide:after {
            position: absolute;
            content: "";
            width: 100%;
            height: 40%;
            bottom: 0;
            left: 0;
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.85));
            z-index: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            z-index: 2;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            cursor: pointer;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slider-arrow:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-50%) scale(1.1);
        }

        .slider-arrow svg {
            width: 30px;
            display: flex;
            color: #f8fafc;
        }

        .prev {
            left: 30px;
        }

        .next {
            right: 30px;
        }

        .slider-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 3;
        }

        .nav-dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background-color: rgba(248, 250, 252, 0.5);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-dot.active,
        .nav-dot:hover {
            background-color: #f8fafc;
            transform: scale(1.4);
            box-shadow: 0 2px 10px rgba(248, 250, 252, 0.6);
        }
        @media (max-width: 1024px) {
            .slider-container {
                height: 450px;
                max-width: 95%;
            }

            .title-text {
                font-size: 2.4rem;
            }

            .new-item {
                width: 280px;
            }
        }
        .slider-container {
            height: 400px;
        }
        .slider-arrow {
            width: 50px;
            height: 50px;
        }

        .slider-arrow svg {
            width: 26px;
        }
        .feedback-text p {
            font-size: 0.9rem;
        }

        .feedback-socials>div:last-child a {
            font-size: 0.9rem;
        }

        .slider-container {
            height: 350px;
        }
        .slider-arrow {
            width: 45px;
            height: 45px;
        }

        .slider-arrow svg {
            width: 24px;
        }
    </style>
</head>

<body>
    <div class="slider-container">
        <div class="slider">
            <div class="slide active">
                <img src="../images/slider/images (1).jpeg">

            </div>
            <div class="slide">
                <img src="../images/slider/images (2).jpeg" >

            </div>
            <div class="slide">
                <img src="../images/slider/images (3).jpeg" >

            </div>
            <div class="slide">
                <img src="../images/slider/images (4).jpeg" >

            </div>
            <div class="slide">
                <img src="../images/slider/images (6).jpeg" >
            </div>
        </div>

        <div class="slider-nav">
        </div>

        <div class="slider-arrow prev">
            <span class="arrow-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
            </span>
        </div>
        <div class="slider-arrow next">
            <span class="arrow-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </span>
        </div>
    </div>

</body>
<script>
    const slides = document.querySelectorAll(".slide");
    const sliderNav = document.querySelector(".slider-nav");
    const slider = document.querySelector(".slider");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");


    const orderBtn = document.querySelector(".order-btn");

    let currentSlide = 0;
    let slideCount = slides.length;
    const dots = [];
    const cart = [];

    slides.forEach((_, index) => {
        const dot = document.createElement("div");
        dot.classList.add("nav-dot");
        if (index === 0) dot.classList.add("active");
        dot.addEventListener("click", () => goToSlide(index));
        sliderNav.appendChild(dot);
        dots.push(dot);
    });

    function updateDots() {
        dots.forEach((dot, index) => {
            dot.classList.toggle("active", index === currentSlide);
        });
    }

    function goToSlide(index) {
        currentSlide = (index + slideCount) % slideCount;
        slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        updateDots();
    }

    function nextSlide() {
        goToSlide(currentSlide + 1);
    }

    function prevSlide() {
        goToSlide(currentSlide - 1);
    }
    prevBtn.addEventListener("click", prevSlide);
    nextBtn.addEventListener("click", nextSlide);
    setInterval(nextSlide, 8000);


</script>

</html>
